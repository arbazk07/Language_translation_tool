<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tongue — Language Translator</title>

  <!-- Google Fonts: Fraunces (display serif, for the personality)
       and Inter (clean body/UI text) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bg-glow"></div>

  <header class="topbar">
    <span class="logo">Tongue</span>
    <span class="tagline">say it, anywhere</span>
  </header>

  <main class="stage">

    <div class="translator-card">

      <!-- SOURCE PANEL -->
      <section class="panel" data-panel="source">
        <div class="panel-head">
          <select id="sourceLang" class="lang-select" aria-label="Source language">
            <option value="auto">Detect language</option>
          </select>
        </div>
        <textarea
          id="sourceText"
          class="text-area"
          placeholder="Start typing..."
          maxlength="3000"
        ></textarea>
        <div class="panel-foot">
          <span id="sourceCount" class="char-count">0 / 3000</span>
        </div>
      </section>

      <!-- SWAP BUTTON (the signature element) -->
      <div class="swap-zone">
        <button id="swapBtn" class="swap-btn" aria-label="Swap languages" title="Swap languages">
          <svg viewBox="0 0 24 24" class="swap-icon" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M7 7h11l-3-3M17 17H6l3 3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <!-- Animated glyphs that drift across during translation -->
        <div id="transitGlyphs" class="transit-glyphs" aria-hidden="true"></div>
      </div>

      <!-- TARGET PANEL -->
      <section class="panel" data-panel="target">
        <div class="panel-head">
          <select id="targetLang" class="lang-select" aria-label="Target language">
            <option value="es">Spanish</option>
          </select>
        </div>
        <div class="text-area output-area" id="targetText" aria-live="polite">
          <span class="placeholder-text">Translation appears here</span>
        </div>
        <div class="panel-foot">
          <button id="copyBtn" class="copy-btn" aria-label="Copy translation" disabled>
            <svg viewBox="0 0 24 24" class="copy-icon" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="11" height="11" rx="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M5 15V5a2 2 0 0 1 2-2h10" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Copy</span>
          </button>
          <button id="speakBtn" class="copy-btn" aria-label="Listen to translation" disabled>
            <svg viewBox="0 0 24 24" class="copy-icon" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M11 5L6 9H3v6h3l5 4V5z" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M16 8a5 5 0 0 1 0 8M19 5a9 9 0 0 1 0 14" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Listen</span>
          </button>
        </div>
      </section>

    </div>

    <button id="translateBtn" class="translate-btn">
      <span class="btn-label">Translate</span>
      <span class="btn-loader" aria-hidden="true"></span>
    </button>

    <p id="errorMsg" class="error-msg" role="alert"></p>

  </main>

  <footer class="footer">
    Tongue — a translation tool with live speech and instant swap
  </footer>

  <script src="script.js"></script>
</body>
</html>
